<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AIScope</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="assets/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <a href="index.html" class="auth-card__logo">AI<span>Scope</span></a>

    <h1 class="auth-card__title">Welcome back</h1>
    <p class="auth-card__sub">Sign in to manage your listing.</p>

    <div class="form-error" id="form-error"></div>

    <div class="form-group">
      <label class="form-label" for="email">Email address <span>*</span></label>
      <input type="email" class="form-input" id="email" placeholder="you@company.com" autocomplete="email" required>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password <span>*</span></label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" required>
      <div style="text-align:right;margin-top:var(--space-2)">
        <a href="forgot-password.html" style="font-size:12px;color:var(--text-3)">Forgot password?</a>
      </div>
    </div>

    <button class="btn btn--primary btn--full" id="login-btn" data-label="Sign In" onclick="handleLogin()">
      Sign In
    </button>

    <div class="auth-card__footer">
      Don't have an account? <a href="register.html">Create one free →</a>
    </div>

  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/auth.js"></script>
<script>

// Redirect if already logged in
redirectIfAuthed('dashboard.html');

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('form-error');

  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    await login(email, password);
    const redirect = getParam('redirect') || 'dashboard.html';
    window.location.href = redirect;
  } catch (err) {
    errEl.textContent = err.message === 'Invalid login credentials'
      ? 'Incorrect email or password.'
      : err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
