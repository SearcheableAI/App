<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Company Profile — AIScope</title>
  <meta name="description" id="page-desc" content="View this AI company's profile, services, and portfolio on AIScope.">
  <meta property="og:title" id="og-title" content="Company Profile — AIScope">
  <meta property="og:description" id="og-desc" content="">
  <meta property="og:image" id="og-image" content="">
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="nav">
  <div class="container">
    <div class="nav__inner">
      <a href="/" class="nav__logo">AI<span>Scope</span></a>
      <div class="nav__links">
        <a href="/search.html" class="nav__link">Browse</a>
      </div>
      <div class="nav__actions" id="nav-actions"></div>
    </div>
  </div>
</nav>

<!-- BREADCRUMB -->
<div style="background:var(--surface);border-bottom:1px solid var(--border);padding:var(--space-3) 0;">
  <div class="container">
    <div style="font-size:13px;color:var(--text-3)">
      <a href="/" style="color:var(--text-3);transition:color .15s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-3)'">Home</a>
      <span style="margin:0 var(--space-2)">›</span>
      <a href="/search.html" style="color:var(--text-3);transition:color .15s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-3)'">Browse</a>
      <span style="margin:0 var(--space-2)">›</span>
      <span id="breadcrumb-name" style="color:var(--text-2)">Loading…</span>
    </div>
  </div>
</div>

<!-- LOADING STATE -->
<div id="loading-state" class="container" style="padding-top:var(--space-8);text-align:center">
  <div style="font-size:14px;color:var(--text-3)">Loading profile…</div>
</div>

<!-- ERROR STATE -->
<div id="error-state" class="container" style="display:none;padding-top:var(--space-8)">
  <div class="empty-state">
    <div class="empty-state__icon">🔍</div>
    <div class="empty-state__title">Company not found</div>
    <p class="empty-state__sub">This listing may have been removed or the URL is incorrect.</p>
    <a href="/search.html" class="btn btn--primary">Browse All Listings →</a>
  </div>
</div>

<!-- MAIN CONTENT (hidden until loaded) -->
<div id="main-content" style="display:none">
  <div class="container">
    <div class="listing-layout">

      <!-- LEFT COLUMN -->
      <div>
        <!-- Hero card -->
        <div class="listing-hero" id="listing-hero">
          <!-- rendered by JS -->
        </div>

        <!-- Description -->
        <div class="listing-section" id="description-section" style="display:none">
          <div class="listing-section__title">About</div>
          <div class="listing-description" id="listing-description"></div>
        </div>

        <!-- Services -->
        <div class="listing-section" id="services-section" style="display:none">
          <div class="listing-section__title">Solutions Offered</div>
          <div style="display:flex;flex-wrap:wrap;gap:var(--space-2)" id="services-list"></div>
        </div>

        <!-- Portfolio -->
        <div class="listing-section" id="portfolio-section" style="display:none">
          <div class="listing-section__title">Portfolio</div>
          <div class="portfolio-grid" id="portfolio-grid"></div>
        </div>
      </div>

      <!-- RIGHT SIDEBAR -->
      <div>
        <!-- CTA -->
        <div class="sidebar-card" id="contact-card">
          <!-- rendered by JS -->
        </div>

        <!-- Company Info -->
        <div class="sidebar-card" id="info-card">
          <div class="sidebar-card__title">Company Info</div>
          <div id="info-rows"></div>
        </div>

        <!-- Claim banner (shown if unclaimed) -->
        <div id="claim-banner" style="display:none;background:var(--surface-2);border:1px dashed var(--border-2);border-radius:var(--radius-lg);padding:var(--space-4);text-align:center;font-size:13px;color:var(--text-3)">
          <div style="margin-bottom:var(--space-2)">🏢 Is this your company?</div>
          <a href="/auth/register.html" class="btn btn--outline btn--sm">Claim this listing</a>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- IMAGE LIGHTBOX -->
<div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;cursor:pointer;align-items:center;justify-content:center;" onclick="closeLightbox()">
  <img id="lightbox-img" style="max-width:90vw;max-height:90vh;border-radius:var(--radius);object-fit:contain;">
</div>

<footer class="footer">
  <div class="container">
    <div class="footer__bottom">
      <a href="/" style="font-family:var(--font-display);font-weight:800;letter-spacing:-0.03em;font-size:1.1rem">
        AI<span style="color:var(--accent)">Scope</span>
      </a>
      <span style="color:var(--text-3);font-size:12px">© 2025 AIScope</span>
    </div>
  </div>
</footer>

<script src="/assets/js/config.js"></script>
<script src="/assets/js/app.js"></script>
<script src="/assets/js/auth.js"></script>
<script>

async function loadListing() {
  const slug = getParam('slug');
  if (!slug) { showError(); return; }

  const { data, error } = await db
    .from('listings')
    .select(`
      *,
      listing_services ( service_id, services ( id, name, slug, icon ) ),
      portfolio_items ( id, title, description, media_url, media_type, sort_order )
    `)
    .eq('slug', slug)
    .eq('status', 'published')
    .single();

  document.getElementById('loading-state').style.display = 'none';

  if (error || !data) { showError(); return; }

  // Increment view count (fire and forget)
  db.from('listings').update({ view_count: (data.view_count || 0) + 1 }).eq('id', data.id);

  renderListing(data);
  document.getElementById('main-content').style.display = 'block';
}

function showError() {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('error-state').style.display = 'block';
}

function renderListing(l) {
  // SEO
  const title = `${l.name} — AI Solutions Directory | AIScope`;
  const desc = l.meta_description || l.tagline;
  document.getElementById('page-title').textContent = title;
  document.getElementById('page-desc').setAttribute('content', desc);
  document.getElementById('og-title').setAttribute('content', l.meta_title || title);
  document.getElementById('og-desc').setAttribute('content', desc);
  if (l.og_image_url) document.getElementById('og-image').setAttribute('content', l.og_image_url);
  document.getElementById('breadcrumb-name').textContent = l.name;

  // Hero
  const logoHtml = l.logo_url
    ? `<img src="${esc(l.logo_url)}" alt="${esc(l.name)} logo" class="listing-hero__logo">`
    : `<div class="listing-hero__logo--placeholder">${esc(l.name?.charAt(0))}</div>`;

  const tierBadge = l.listing_tier === 'sponsored'
    ? `<span class="badge badge--sponsored">Sponsored</span>`
    : l.listing_tier === 'featured' ? `<span class="badge badge--featured">Featured</span>` : '';

  const verifiedBadge = l.is_verified ? `<span class="badge badge--verified">✓ Verified</span>` : '';

  document.getElementById('listing-hero').innerHTML = `
    <div class="listing-hero__top">
      ${logoHtml}
      <div style="flex:1;min-width:0">
        <div style="display:flex;flex-wrap:wrap;gap:var(--space-2);margin-bottom:var(--space-3)">
          ${tierBadge}${verifiedBadge}
          <span class="badge" style="background:var(--surface-3);color:var(--text-2);border:1px solid var(--border)">${esc(LISTING_TYPES[l.listing_type] || l.listing_type)}</span>
        </div>
        <h1 class="listing-hero__name">${esc(l.name)}</h1>
        <p class="listing-hero__tagline">${esc(l.tagline)}</p>
      </div>
    </div>
    ${l.listing_services && l.listing_services.length ? `
      <div class="listing-hero__services">
        ${l.listing_services.map(ls => `<span class="service-tag">${ls.services?.icon || ''} ${esc(ls.services?.name || '')}</span>`).join('')}
      </div>
    ` : ''}
  `;

  // Description
  if (l.description) {
    document.getElementById('description-section').style.display = 'block';
    document.getElementById('listing-description').textContent = l.description;
  }

  // Services
  if (l.listing_services && l.listing_services.length) {
    document.getElementById('services-section').style.display = 'block';
    document.getElementById('services-list').innerHTML = l.listing_services.map(ls =>
      `<a href="/search.html?category=${esc(ls.services?.slug)}" class="service-tag">${ls.services?.icon || ''} ${esc(ls.services?.name || '')}</a>`
    ).join('');
  }

  // Portfolio
  const portfolio = l.portfolio_items?.sort((a, b) => a.sort_order - b.sort_order);
  if (portfolio && portfolio.length) {
    document.getElementById('portfolio-section').style.display = 'block';
    document.getElementById('portfolio-grid').innerHTML = portfolio.map(item => `
      <div class="portfolio-item" onclick="openLightbox('${esc(item.media_url)}')">
        <img src="${esc(item.media_url)}" alt="${esc(item.title || '')}" loading="lazy">
      </div>
    `).join('');
  }

  // Contact CTA
  const websiteBtn = l.website_url
    ? `<a href="${esc(l.website_url)}" target="_blank" rel="noopener noreferrer" class="btn btn--primary btn--full">Visit Website →</a>`
    : '';
  const emailBtn = l.contact_email && l.contact_email_public
    ? `<a href="mailto:${esc(l.contact_email)}" class="btn btn--outline btn--full" style="margin-top:var(--space-2)">Send Email</a>`
    : '';
  const contactFormBtn = l.contact_form_url
    ? `<a href="${esc(l.contact_form_url)}" target="_blank" rel="noopener noreferrer" class="btn btn--outline btn--full" style="margin-top:var(--space-2)">Contact Form</a>`
    : '';

  document.getElementById('contact-card').innerHTML = `
    <div class="sidebar-card__title">Contact</div>
    ${websiteBtn}${emailBtn}${contactFormBtn}
    ${!l.website_url && !l.contact_email && !l.contact_form_url
      ? `<p style="font-size:13px;color:var(--text-3)">No contact info provided.</p>` : ''}
  `;

  // Info rows
  const infoRows = [];
  if (l.hq_city || l.hq_country) infoRows.push(['Location', [l.hq_city, l.hq_country].filter(Boolean).join(', ')]);
  if (l.founded_year) infoRows.push(['Founded', l.founded_year]);
  if (l.team_size) infoRows.push(['Team Size', l.team_size + ' people']);
  if (l.pricing_model) infoRows.push(['Pricing', PRICING_MODELS.find(p => p.value === l.pricing_model)?.label || l.pricing_model]);
  if (l.pricing_starts_at) infoRows.push(['Starting at', `$${l.pricing_starts_at}/mo`]);
  if (l.linkedin_url) infoRows.push(['LinkedIn', `<a href="${esc(l.linkedin_url)}" target="_blank" rel="noopener noreferrer">View Profile</a>`]);
  infoRows.push(['Listed', timeAgo(l.created_at)]);

  document.getElementById('info-rows').innerHTML = infoRows.map(([label, value]) => `
    <div class="info-row">
      <span class="info-row__label">${esc(label)}</span>
      <span class="info-row__value">${value}</span>
    </div>
  `).join('');

  // Claim banner
  if (!l.is_claimed) {
    document.getElementById('claim-banner').style.display = 'block';
  }
}

// ── Lightbox ──────────────────────────────────────────────────
function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

loadListing();
</script>
</body>
</html>
